# Socket.dev security configuration
# Documents intentional capabilities of @getforma/core
#
# This library includes HTTP primitives (createFetch, createSSE, createWebSocket)
# and server function RPC ($$serverFunction) that require network access.
# The network access is a documented, intentional feature — not a supply chain risk.

issueRules:
  # Network access is intentional — this is a full-stack reactive library
  # with built-in HTTP primitives (fetch, SSE, WebSocket)
  networkAccess: false
