name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Cross-repo dispatch PAT (optional). Surfaced as env so the notify step
      # can skip cleanly when it isn't configured, rather than erroring.
      FORMA_DISPATCH_TOKEN: ${{ secrets.FORMA_DISPATCH_TOKEN }}
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Check bundle size
        run: |
          MAX_INDEX=12000     # main entry, ~7.6KB today
          MAX_RUNTIME=28000   # CDN runtime bundle, ~24KB today
          INDEX_SIZE=$(gzip -c dist/index.js | wc -c)
          RUNTIME_SIZE=$(gzip -c dist/formajs-runtime.global.js | wc -c)
          echo "dist/index.js: ${INDEX_SIZE} bytes gzipped (limit ${MAX_INDEX})"
          echo "dist/formajs-runtime.global.js: ${RUNTIME_SIZE} bytes gzipped (limit ${MAX_RUNTIME})"
          if [ "$INDEX_SIZE" -gt "$MAX_INDEX" ]; then
            echo "::error::index.js ${INDEX_SIZE} exceeds limit ${MAX_INDEX} bytes"
            exit 1
          fi
          if [ "$RUNTIME_SIZE" -gt "$MAX_RUNTIME" ]; then
            echo "::error::runtime bundle ${RUNTIME_SIZE} exceeds limit ${MAX_RUNTIME} bytes"
            exit 1
          fi

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      # Trusted publishing: uses OIDC for auth, no npm token needed.
      # Provenance is generated automatically.
      # Configure at: npmjs.com/package/@getforma/core → Settings → Trusted Publisher
      - run: npm publish --access public

      - name: Notify create-forma-app to update dependency
        # Skip silently when no dispatch PAT is configured (OIDC covers npm
        # publish but not cross-repo dispatch). continue-on-error is a
        # belt-and-suspenders for an expired/invalid token.
        if: success() && env.FORMA_DISPATCH_TOKEN != ''
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ env.FORMA_DISPATCH_TOKEN }}
          repository: getforma-dev/create-forma-app
          event-type: core-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
