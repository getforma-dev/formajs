name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

      - name: Check bundle size
        run: |
          MAX_SIZE=25000  # 25KB gzipped
          INDEX_SIZE=$(gzip -c dist/index.js | wc -c)
          RUNTIME_SIZE=$(gzip -c dist/formajs-runtime.global.js | wc -c)
          echo "dist/index.js: ${INDEX_SIZE} bytes gzipped"
          echo "dist/formajs-runtime.global.js: ${RUNTIME_SIZE} bytes gzipped"
          if [ "$INDEX_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::Bundle size ${INDEX_SIZE} exceeds limit ${MAX_SIZE} bytes"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
