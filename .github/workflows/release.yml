name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Check bundle size
        run: |
          MAX_SIZE=25000
          INDEX_SIZE=$(gzip -c dist/index.js | wc -c)
          if [ "$INDEX_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::Bundle size ${INDEX_SIZE} exceeds limit ${MAX_SIZE} bytes"
            exit 1
          fi

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      # Trusted publishing: uses OIDC for auth, no npm token needed.
      # Provenance is generated automatically.
      # Configure at: npmjs.com/package/@getforma/core → Settings → Trusted Publisher
      - run: npm publish --access public

      - name: Notify create-forma-app to update dependency
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FORMA_DISPATCH_TOKEN }}
          repository: getforma-dev/create-forma-app
          event-type: core-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
