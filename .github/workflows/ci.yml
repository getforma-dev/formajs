name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

      - name: Check bundle size
        run: |
          # Separate, honest gates. Previously only index.js was enforced while
          # the (much larger) runtime bundle was printed but never gated.
          MAX_INDEX=12000     # main entry, ~7.6KB today
          MAX_RUNTIME=28000   # CDN runtime bundle, ~24KB today
          INDEX_SIZE=$(gzip -c dist/index.js | wc -c)
          RUNTIME_SIZE=$(gzip -c dist/formajs-runtime.global.js | wc -c)
          echo "dist/index.js: ${INDEX_SIZE} bytes gzipped (limit ${MAX_INDEX})"
          echo "dist/formajs-runtime.global.js: ${RUNTIME_SIZE} bytes gzipped (limit ${MAX_RUNTIME})"
          if [ "$INDEX_SIZE" -gt "$MAX_INDEX" ]; then
            echo "::error::index.js ${INDEX_SIZE} exceeds limit ${MAX_INDEX} bytes"
            exit 1
          fi
          if [ "$RUNTIME_SIZE" -gt "$MAX_RUNTIME" ]; then
            echo "::error::runtime bundle ${RUNTIME_SIZE} exceeds limit ${MAX_RUNTIME} bytes"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
